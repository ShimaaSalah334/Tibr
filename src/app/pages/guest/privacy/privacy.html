<section class="legal-section py-5 bg-dark-custom text-white">
  <div class="container py-4">
    <div class="text-center mb-5">
      <span class="text-gold text-uppercase tracking-wider small fw-bold">{{ 'privacy.lastUpdated' | translate }}</span>
      <h1 class="display-5 fw-bold mt-2 font-serif text-light">{{ 'privacy.title' | translate }}</h1>
    </div>

    <div class="row justify-content-center">
      <div class="col-lg-10">
        <div class="legal-card p-4 p-md-5">
          @for (section of sections; track section) {
            <div class="legal-section-block mb-5">
              <h2 class="h4 fw-bold text-gold mb-3 font-serif">
                {{ 'privacy.section' + section + '.title' | translate }}
              </h2>
              <p class="subtext lh-lg">
                {{ 'privacy.section' + section + '.content' | translate }}
              </p>
            </div>
          }
        </div>
      </div>
    </div>
  </div>
</section>
