<main class="container-max mx-auto px-3 px-md-5 py-4 py-md-5">
    <div class="row g-4">
      <div class="col-12 col-lg-8 d-flex flex-column gap-4">
        <section>
          <h1 class="h3 fw-bold text-gold-light mb-2">إنشاء استراتيجية جديدة</h1>
          <p class="small text-muted-gold mb-0">حدد المعايير الخاصة بك لتنفيذ تداولات السبائك الآلية.</p>
        </section>

        <div class="row g-3">
          <div class="col-12 mb-2">
            <label class="small fw-semibold text-gold-label mb-2 d-block">اختيار الأصل</label>
            <div class="row g-3">
              <div class="col-12 col-md-6">
                <button 
                  type="button" 
                  class="w-100 d-flex align-items-center justify-content-between p-3 rounded-3 border asset-btn transition-base text-white"
                  [class.active-asset]="selectedAsset === 'gold'"
                  (click)="selectAsset('gold')">
                  <div class="d-flex align-items-center gap-3">
                    <span class="material-symbols-outlined text-gold-light">stars</span>
                    <span class="fs-6 fw-medium">الذهب (Gold)</span>
                  </div>
                  <!-- <span class="material-symbols-outlined text-gold-light transition-base" 
                        [style.font-variation-settings]="selectedAsset === 'gold' ? ''FILL' 1' : ''FILL' 0'"
                        [class.opacity-0]="selectedAsset !== 'gold'">check_circle</span> -->
                </button>
              </div>
              <div class="col-12 col-md-6">
                <button 
                  type="button" 
                  class="w-100 d-flex align-items-center justify-content-between p-3 rounded-3 border asset-btn transition-base text-white"
                  [class.active-asset]="selectedAsset === 'silver'"
                  (click)="selectAsset('silver')">
                  <div class="d-flex align-items-center gap-3">
                    <span class="material-symbols-outlined text-muted-gold">toll</span>
                    <span class="fs-6 fw-medium">الفضة (Silver)</span>
                  </div>
                  <!-- <span class="material-symbols-outlined text-muted-gold transition-base" 
                        [style.font-variation-settings]="selectedAsset === 'silver' ? ''FILL' 1' : ''FILL' 0'"
                        [class.opacity-0]="selectedAsset !== 'silver'">check_circle</span> -->
                </button>
              </div>
            </div>
          </div>

          <div class="col-12 col-md-6">
            <label class="small fw-semibold text-gold-label mb-2 d-block">نوع الشرط</label>
            <select class="form-select form-control-dark h-input px-3 fs-6" [(ngModel)]="conditionType">
              <option value="Less Than">السعر أقل من (Price Less Than)</option>
              <option value="Greater Than">السعر أكبر من (Price Greater Than)</option>
              <option value="Equal To">السعر يساوي (Price Equal To)</option>
            </select>
          </div>

          <div class="col-12 col-md-6">
            <label class="small fw-semibold text-gold-label mb-2 d-block">السعر المستهدف ($)</label>
            <input 
              type="number" 
              class="form-control form-control-dark h-input px-3 fs-6" 
              placeholder="مثلاً: 2400" 
              [(ngModel)]="targetPrice" />
          </div>

          <div class="col-12 col-md-6">
            <label class="small fw-semibold text-gold-label mb-2 d-block">نوع التنفيذ</label>
            <select class="form-select form-control-dark h-input px-3 fs-6" [(ngModel)]="executionType">
              <option value="Alert Only">تنبيه فقط (Alert Only)</option>
              <option value="Auto Execute">تنفيذ تلقائي (Auto Execute)</option>
              <option value="Alert + Execute">تنبيه + تنفيذ (Alert + Execute)</option>
            </select>
          </div>

          <div class="col-12 col-md-6">
            <label class="small fw-semibold text-gold-label mb-2 d-block">تاريخ الانتهاء</label>
            <input type="date" class="form-control form-control-dark h-input px-3 fs-6" [(ngModel)]="expirationDate" />
          </div>
        </div>
      </div>

      <aside class="col-12 col-lg-4 d-flex flex-column gap-4">
        <div class="summary-container border rounded-3 p-4 position-sticky sidebar-sticky-top">
          <div class="d-flex align-items-center gap-2 mb-4 border-bottom border-translucent pb-3">
            <span class="material-symbols-outlined text-gold-light">analytics</span>
            <h2 class="fs-5 fw-bold text-gold-light m-0">ملخص الاستراتيجية</h2>
          </div>

          <div class="d-flex flex-column gap-4">
 

            <div class="d-flex flex-column gap-3">
              <div class="d-flex justify-content-between align-items-center small">
                <span class="text-muted-gold">الأصل:</span>
                <span class="fw-bold text-white">{{ assetArabicName }}</span>
              </div>
              <div class="d-flex justify-content-between align-items-center small">
                <span class="text-muted-gold">الرافعة المالية:</span>
                <span class="fw-bold text-white">1:1 (Physical)</span>
              </div>
              <div class="d-flex justify-content-between align-items-center small">
                <span class="text-muted-gold">الرسوم المتوقعة:</span>
                <span class="fw-bold text-gold-light">0.15%</span>
              </div>
            </div>

            <button 
              type="button" 
              (click)="launchStrategy()" 
              class="w-100 py-3 btn-gold border-0 rounded-3 fw-bold fs-5 d-flex align-items-center justify-content-center gap-2 shadow">
              <span>إطلاق الاستراتيجية</span>
              <span class="material-symbols-outlined">rocket_launch</span>
            </button>

            <p class="tiny-text text-center text-muted-gold opacity-50 mb-0">
              من خلال الإطلاق، فإنك توافق على شروط التداول الآلي في TIBR.
            </p>
          </div>
        </div>
      </aside>
    </div>
  </main>
