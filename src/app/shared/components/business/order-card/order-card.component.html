<a [routerLink]="['/orders', order.id]" class="text-decoration-none">
  <div class="card mb-3">
    <div class="card-body">
      <div class="d-flex justify-content-between align-items-center">
        <div>
          <h6 class="card-subtitle text-muted mb-1">#{{ order.orderNumber }}</h6>
          <p class="card-text mb-0">{{ order.createdAt | date:'mediumDate' }}</p>
          <small class="text-muted">{{ order.items.length }} item(s)</small>
        </div>
        <div class="text-end">
          <p class="fw-bold mb-1">{{ order.totalAmount | currency }}</p>
          <app-status-badge [label]="order.orderStatus" />
          <app-status-badge [label]="order.paymentStatus" />
        </div>
      </div>
    </div>
  </div>
</a>
