<a [routerLink]="['/orders', order.id]" class="text-decoration-none investment-card-link">
  <div class="card mb-4 border-0 asset-card position-relative overflow-hidden">
    
    <!-- تأثير توهج خلفي خفيف (Glow Effect) يعطي إحساس المعادن الثمينة -->
    <div class="asset-glow position-absolute"></div>

    <div class="card-body p-4 position-relative z-1">
      <div class="row align-items-center gy-3">
        
        <!-- القسم الأول: نوع الاستثمار ورقم العملية -->
        <div class="col-md-7 col-sm-6">
          <div class="d-flex align-items-center gap-3">
            <!-- أيقونة تعبيرية حسب نوع الأصل (يمكنك تخصيصها لاحقاً) -->
            <div class="asset-icon-wrapper d-flex align-items-center justify-content-center rounded-circle">
              <i class="bi bi-shield-shaded fs-4 text-gold"></i>
            </div>
            <div>
              <span class="text-uppercase tracking-wider small fw-bold text-gold-metallic d-block mb-1">
                #{{ order.orderNumber }}
              </span>
              <p class="mb-0 text-white-50 small">
                <i class="bi bi-calendar3 me-1"></i> {{ order.createdAt | date:'medium' }}
              </p>
            </div>
          </div>
        </div>

        <!-- القسم الثالث: القيمة المالية الحالية للمحفظة -->
        <div class="col-md-3 col-sm-6 text-sm-start text-md-center">
          <span class="text-white small d-block mb-1">{{ i18n.translate('orders.totalAmount', 'Total Amount') }}</span>
          <p class="fw-bold fs-4 text-gold-live mb-0 tracking-tight">
            {{ order.totalAmount | currency:'EGP' }}
          </p>
        </div>

        <!-- القسم الرابع: الحالات الأمنية وسهم الانتقال -->
        <div class="col-md-2 col-sm-6 d-flex justify-content-sm-start justify-content-md-end align-items-center gap-3">
          <div class="d-flex flex-column gap-1 text-end w-100 align-items-md-end">
            <app-status-badge [label]="order.orderStatus" />
            <app-status-badge [label]="order.paymentStatus" />
          </div>
          <!-- سهم احترافي مذهب -->
          <div class="arrow-wrapper d-none d-md-flex align-items-center justify-content-center rounded-circle">
            <i class="bi bi-arrow-up-right fs-6 text-gold"></i>
          </div>
        </div>

      </div>
    </div>
  </div>
</a>
