<form [formGroup]="form" class="luxury-form animate-fade-in">
  
  <div class="form-group-custom mb-4">
    <label for="street" class="luxury-label">Street Address</label>
    <div class="input-wrapper">
      <i class="fas fa-road input-icon"></i>
      <input id="street" type="text" class="luxury-input" formControlName="street" placeholder="e.g. 123 El Horreya St." />
    </div>
  </div>

  <div class="row g-4 mb-4">
    <div class="col-md-6">
      <div class="form-group-custom">
        <label for="city" class="luxury-label">City</label>
        <div class="input-wrapper">
          <i class="fas fa-city input-icon"></i>
          <input id="city" type="text" class="luxury-input" formControlName="city" placeholder="e.g. Cairo" />
        </div>
      </div>
    </div>
    
    <div class="col-md-6">
      <div class="form-group-custom">
        <label for="state" class="luxury-label">State / Region</label>
        <div class="input-wrapper">
          <i class="fas fa-map input-icon"></i>
          <input id="state" type="text" class="luxury-input" formControlName="state" placeholder="e.g. Giza" />
        </div>
      </div>
    </div>
  </div>

  <div class="row g-4">
    <div class="col-md-6">
      <div class="form-group-custom">
        <label for="zip" class="luxury-label">ZIP / Postal Code</label>
        <div class="input-wrapper">
          <i class="fas fa-mail-bulk input-icon"></i>
          <input id="zip" type="text" class="luxury-input" formControlName="zip" placeholder="e.g. 11511" />
        </div>
      </div>
    </div>
    
    <div class="col-md-6">
      <div class="form-group-custom">
        <label for="country" class="luxury-label">Country</label>
        <div class="input-wrapper">
          <i class="fas fa-globe input-icon"></i>
          <input id="country" type="text" class="luxury-input" formControlName="country" placeholder="e.g. Egypt" />
        </div>
      </div>
    </div>
  </div>

</form>
